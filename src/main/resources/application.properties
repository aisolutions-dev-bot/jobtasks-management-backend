quarkus.http.port=${PORT:8081}

# ─── Datasource ───────────────────────────────────────────────────────────────
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=${DB_USERNAME:db_test2}
quarkus.datasource.password=${DB_PASSWORD:DB12*test34}
quarkus.datasource.reactive.url=${DB_URL:mysql://borneochemicalintl.com:3306/db_test2}
quarkus.datasource.reactive.max-size=3
quarkus.datasource.reactive.connect-timeout=30
quarkus.datasource.reactive.idle-timeout=PT5M
quarkus.datasource.reactive.max-lifetime=PT10M
quarkus.datasource.reactive.idle-removal-interval=PT2M

# ─── Hibernate Reactive ───────────────────────────────────────────────────────
quarkus.hibernate-reactive.database.generation=none

# ─── CORS ─────────────────────────────────────────────────────────────────────
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:4000,http://localhost:4200,http://localhost:4005,http://localhost:4008
quarkus.http.cors.methods=GET,PUT,POST,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=X-Custom,Content-Type,authorization,X-Login-Type
quarkus.http.cors.exposed-headers=Content-Disposition,authorization
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true
%prod.quarkus.http.cors.origins=https://ai-solutions-shell-production.up.railway.app,https://aisolutionspl.com
%staging.quarkus.http.cors.origins=https://ai-solutions-shell-production.up.railway.app,https://aisolutionspl.com

# ─── Organization API (RBAC) ──────────────────────────────────────────────────
organization-api/mp-rest/url=http://localhost:8080
%prod.organization-api/mp-rest/url=${ORG_SERVICE_URL:http://ai-solutions-organization-api.railway.internal:8080}
%staging.organization-api/mp-rest/url=${ORG_SERVICE_URL}

# ─── Service account for org-api calls ───────────────────────────────────────
app.service.username=${SERVICE_ACCOUNT_USERNAME:admin}
app.service.password=${SERVICE_ACCOUNT_PASSWORD:admin}

# ─── FTP Server ───────────────────────────────────────────────────────────────
# host/credentials only — base path is resolved at runtime from m07SystemParameters:
#   ATTACHMENT-MAIN-URL       → e.g. /test.borneochemicalintl.com/pms-attachments
#   ATTACHMENT-PATH-JOBTASKS  → e.g. JOBTASKS
ftp.host=${FTP_HOST:borneochemicalintl.com}
ftp.port=${FTP_PORT:21}
ftp.username=${FTP_USERNAME:ftpuser}
ftp.password=${FTP_PASSWORD:ftppassword}

# ─── Multipart upload limits ──────────────────────────────────────────────────
quarkus.http.limits.max-body-size=25M
quarkus.http.body.handle-files-as-blocking=true
